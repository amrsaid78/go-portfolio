<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist - Stock Market Pro X</title>
    
    <style>
        /* 1. المتغيرات والألوان الموحدة (نفس باقي الصفحات) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #3fb950;
            --positive: #3fb950;
            --negative: #f85149;
            --warning: #dbab09;
            --sidebar-w: 240px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* السايد بار الموحد (اللوجو الصح) */
        .sidebar {
            width: var(--sidebar-w);
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
            flex-shrink: 0;
        }

        .logo { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 35px; }
        .logo span { color: var(--accent); }

        nav ul { list-style: none; }
        nav ul li {
            padding: 12px 15px; border-radius: 8px; color: var(--text-dim);
            cursor: pointer; font-size: 14px; margin-bottom: 5px; transition: 0.2s;
        }
        nav ul li:hover, nav ul li.active { background-color: #1f2937; color: #fff; }

        /* المحتوى الرئيسي */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; color: #fff; }
        
        .add-btn { background-color: var(--positive); color: #fff; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; }

        .card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }

        /* الجدول */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: var(--text-dim); font-size: 12px; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }

        .positive { color: var(--positive); font-weight: 600; }
        .negative { color: var(--negative); font-weight: 600; }

        /* أزرار الأكشن (شراء وحذف) */
        .buy-btn { background: rgba(63, 185, 80, 0.15); color: #3fb950; border: 1px solid rgba(63, 185, 80, 0.2); padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .remove-btn { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.2); padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: 5px; }

        /* التقييمات */
        .valuation-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .val-undervalued { background: rgba(63, 185, 80, 0.15); color: #3fb950; }
        .val-fair { background: rgba(219, 171, 9, 0.15); color: #dbab09; }
        .val-overvalued { background: rgba(248, 81, 73, 0.15); color: #f85149; }

        /* المودال الشامل (خاناتك كاملة) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border); padding: 25px; border-radius: 12px; width: 420px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: var(--text-dim); font-size: 13px; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--bg-main); border: 1px solid var(--border); color: #fff; border-radius: 6px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Stock Market <span>Pro X</span></div>
    <nav>
        <ul>
            <li onclick="window.location.href='index.html'">Dashboard</li>
            <li onclick="window.location.href='analytics.html'">Analytics</li>
            <li onclick="window.location.href='reports.html'">Reports</li>
            <li class="active" onclick="window.location.href='watchlist.html'">Watchlist</li>
            <li onclick="window.location.href='settings.html'">Settings</li>
        </ul>
    </nav>
</div>

<div class="main-content">
    <header>
        <div>
            <h1>Market Watchlist</h1>
            <p style="color:var(--text-dim)">Monitor potential stocks with Smart Valuation</p>
        </div>
        <button class="add-btn" onclick="openWatchModal()">+ Add Symbol</button>
    </header>

    <div class="card">
        <table id="watchlistTable">
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Current Price</th>
                    <th>52W High</th>
                    <th>Fair Value & Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="watchModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Add to Watchlist</h2>
        <br>
        <div class="form-group">
            <label>Symbol *</label>
            <input type="text" id="watchSymbol" placeholder="e.g., AAPL">
        </div>
        <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="watchCompanyName">
        </div>
        <div class="form-group">
            <label>Current Price</label>
            <input type="number" id="watchPrice" step="0.01">
        </div>
        <div class="form-group">
            <label>52-Week High</label>
            <input type="number" id="watchHigh" step="0.01">
        </div>
        <div class="form-group">
            <label>Sector / Valuation Method</label>
            <select id="watchSector">
                <option value="growth">🚀 Tech / Growth (DCF)</option>
                <option value="dividend">💰 High Dividend (DDM)</option>
                <option value="classic">🏢 Banking / Classic (Graham)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Market (Currency)</label>
            <select id="watchMarketSelect">
                <option value="🇺🇸">🇺🇸 US Dollar ($)</option>
                <option value="🇪🇬">🇪🇬 Egyptian Pound (EGP)</option>
                <option value="🇸🇦">🇸🇦 Saudi Riyal (SAR)</option>
            </select>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
            <button style="background:none; color:#fff; border:none; cursor:pointer;" onclick="closeWatchModal()">Cancel</button>
            <button class="add-btn" onclick="saveWatchItem()">Save to List</button>
        </div>
    </div>
</div>

<script>
    let watchlist = [
        { symbol: 'MSFT', name: 'Microsoft Corp.', price: 420.50, high52: 430.00, market: '🇺🇸', sector: 'growth' },
        { symbol: 'COPT', name: 'Egyptians for Housing', price: 0.35, high52: 0.50, market: '🇪🇬', sector: 'classic' }
    ];

    function calculateFairValue(price, sector) {
        let fv = sector === 'growth' ? price * 1.15 : (sector === 'dividend' ? price * 0.95 : price * 0.85);
        let status = fv > price * 1.05 ? 'Under-valued' : (fv < price * 0.95 ? 'Over-valued' : 'Fair Value');
        let badge = fv > price * 1.05 ? 'val-undervalued' : (fv < price * 0.95 ? 'val-overvalued' : 'val-fair');
        return { fv: fv.toFixed(2), status, badge };
    }

    function renderWatchlist() {
        const tbody = document.querySelector('#watchlistTable tbody');
        tbody.innerHTML = '';
        watchlist.forEach((item, index) => {
            const val = calculateFairValue(item.price, item.sector);
            tbody.innerHTML += `
                <tr>
                    <td><strong>${item.market} ${item.symbol}</strong><br><small style="color:var(--text-dim)">${item.name}</small></td>
                    <td>$${item.price.toFixed(2)}</td>
                    <td>$${item.high52.toFixed(2)}</td>
                    <td>
                        <div style="font-weight:bold">$${val.fv}</div>
                        <span class="valuation-badge ${val.badge}">${val.status}</span>
                    </td>
                    <td>
                        <button class="buy-btn" onclick="alert('Opening Buy Order for ${item.symbol}')">Buy</button>
                        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                    </td>
                </tr>`;
        });
    }

    function openWatchModal() { document.getElementById('watchModal').style.display = 'flex'; }
    function closeWatchModal() { document.getElementById('watchModal').style.display = 'none'; }

    function saveWatchItem() {
        const symbol = document.getElementById('watchSymbol').value;
        if (!symbol) return alert("Enter Symbol");
        
        watchlist.push({
            symbol: symbol.toUpperCase(),
            name: document.getElementById('watchCompanyName').value || 'Asset',
            price: parseFloat(document.getElementById('watchPrice').value) || 0,
            high52: parseFloat(document.getElementById('watchHigh').value) || 0,
            sector: document.getElementById('watchSector').value,
            market: document.getElementById('watchMarketSelect').value
        });
        renderWatchlist();
        closeWatchModal();
    }

    function removeItem(index) {
        if(confirm("Delete this item?")) {
            watchlist.splice(index, 1);
            renderWatchlist();
        }
    }

    window.onload = renderWatchlist;
</script>
</body>
</html>
